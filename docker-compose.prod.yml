version: "3.8"

services:
  backend:
    image: jinsugyeong/bookchiki-backend:latest
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      opensearch:
        condition: service_healthy
    volumes:
      - ./backend:/app      # 백엔드 코드 핫 리로드
      - .:/project          # 프로젝트 루트 (scripts, output, backups 접근용)

  opensearch:
    build: ./opensearch
    environment:
      - discovery.type=single-node
      - plugins.security.disabled=true
      - OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=${OPENSEARCH_PASSWORD}
    ports:
      - "9200:9200"
    volumes:
      - osdata:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

volumes:
  osdata: